<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Task success chart</title>
  <desc id="desc">Bar chart comparing AO3 and FandomForge task success rates for the two reported tasks.</desc>
  <rect width="1200" height="760" fill="#fffaf3"/>
  <text x="84" y="92" fill="#1f1a17" font-family="Georgia, serif" font-size="40" font-weight="700">Figure 7 · Task Success Rates</text>
  <text x="84" y="130" fill="#6c594f" font-family="Trebuchet MS, sans-serif" font-size="24">Percent success on the two comparative discovery tasks.</text>
  <g transform="translate(132 182)">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#5f4f45" stroke-width="3"/>
    <line x1="0" y1="400" x2="920" y2="400" stroke="#5f4f45" stroke-width="3"/>
    <g stroke="#ddd1c6" stroke-width="2">
      <line x1="0" y1="320" x2="920" y2="320"/>
      <line x1="0" y1="240" x2="920" y2="240"/>
      <line x1="0" y1="160" x2="920" y2="160"/>
      <line x1="0" y1="80" x2="920" y2="80"/>
      <line x1="0" y1="0" x2="920" y2="0"/>
    </g>
    <g fill="#7a675c" font-family="Trebuchet MS, sans-serif" font-size="20">
      <text x="-50" y="406">0%</text>
      <text x="-60" y="326">20%</text>
      <text x="-60" y="246">40%</text>
      <text x="-60" y="166">60%</text>
      <text x="-60" y="86">80%</text>
      <text x="-70" y="6">100%</text>
    </g>
    <g fill="#52453d">
      <rect x="120" y="172" width="108" height="228" rx="10"/>
      <rect x="282" y="28" width="108" height="372" rx="10" fill="#8e2130"/>
      <rect x="560" y="228" width="108" height="172" rx="10"/>
      <rect x="722" y="116" width="108" height="284" rx="10" fill="#8e2130"/>
    </g>
    <g fill="#1f1a17" font-family="Trebuchet MS, sans-serif" font-size="24" font-weight="700">
      <text x="143" y="160">57%</text>
      <text x="305" y="16">93%</text>
      <text x="583" y="216">43%</text>
      <text x="745" y="104">71%</text>
    </g>
    <g fill="#6c594f" font-family="Trebuchet MS, sans-serif" font-size="28" font-weight="700">
      <text x="86" y="450">FindStoryByTheme</text>
      <text x="548" y="450">FindSimilarStory</text>
    </g>
  </g>
  <g transform="translate(864 112)" font-family="Trebuchet MS, sans-serif" font-size="22">
    <rect x="0" y="0" width="26" height="26" rx="6" fill="#52453d"/>
    <text x="40" y="21" fill="#52453d">AO3</text>
    <rect x="110" y="0" width="26" height="26" rx="6" fill="#8e2130"/>
    <text x="150" y="21" fill="#8e2130">FandomForge</text>
  </g>
</svg>
